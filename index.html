<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Python en el navegador</title>

<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

</head>

<body>

<h1>🐍 Python en Cloudflare Pages</h1>

<div id="output"></div>

<py-script>
from pyscript import display

mensaje = "Hola Mundo desde Python en el navegador 🚀"

display(mensaje, target="output")
</py-script>

</body>
</html>
